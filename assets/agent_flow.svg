<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A flow diagram showing the agent loop with technology labels: the user asks a question, Qwen3 running locally via Ollama decides what to search, a Playwright scraper runs against SEEK and checks SQLite memory for already-seen jobs, new results are scored with a structured JSON prompt, and the agent replies in natural language, looping back to search again for additional roles.</desc>
