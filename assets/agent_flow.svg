<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SEEK job agent reasoning loop</title>
<desc>Five-step flow: you ask, agent decides, tool runs, results scored, agent replies, with a loop back to search again.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="420" fill="#ffffff"/>

<!-- Step 1: You ask -->
<rect x="40" y="60" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="100" y="80" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">You ask</text>
<text x="100" y="98" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#444441">"Find data jobs"</text>

<!-- Step 2: Agent decides -->
<rect x="200" y="60" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="260" y="80" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">Agent decides</text>
<text x="260" y="98" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489">Qwen3 picks a search</text>

<!-- Step 3: Tool runs -->
<rect x="360" y="60" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="420" y="80" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">Tool runs</text>
<text x="420" y="98" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#085041">Real SEEK scrape</text>

<!-- Step 4: Results scored -->
<rect x="520" y="60" width="120" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="580" y="80" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Results scored</text>
<text x="580" y="98" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#712B13">Matched to criteria</text>

<!-- Connectors row 1 -->
<line x1="160" y1="88" x2="198" y2="88" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="320" y1="88" x2="358" y2="88" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="480" y1="88" x2="518" y2="88" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Drop down to step 5 -->
<path d="M580 116 L580 200 L260 200 L260 238" fill="none" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 5: Agent replies -->
<rect x="200" y="238" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="260" y="258" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">Agent replies</text>
<text x="260" y="276" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489">Plain-language summary</text>

<!-- Loop back arrow -->
<path d="M200 266 L120 266 L120 175 L258 175 L258 118" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)" opacity="0.7"/>
<text x="60" y="200" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#444441">↻ searches again</text>
<text x="60" y="216" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#444441">for another role</text>

</svg>
